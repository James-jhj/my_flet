name: Build Flet Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet flet-audio lunardate requests mutagen

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' main.py)
          VERSION_CODE=$(grep -oP 'APP_VERSION_CODE = \K\d+' main.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "从 main.py 读取到版本: $VERSION, 版本号: $VERSION_CODE"

      - name: Create pyproject.toml
        run: |
          cat > pyproject.toml << 'EOF'
          [project]
          name = "birthday_reminder"
          version = "${{ steps.version.outputs.version }}"
          description = "事件提醒助手"
          requires-python = ">=3.9"
          dependencies = [
              "flet",
              "flet-audio",
              "lunardate",
              "requests",
              "mutagen",
          ]

          [tool.flet]
          org = "com.jianghuajie"
          product = "事件提醒助手"

          [tool.flet.flutter]
          dependencies = ["flet_audio"]

          [tool.flet.android.permission]
          "android.permission.READ_MEDIA_AUDIO" = true
          "android.permission.READ_EXTERNAL_STORAGE" = true
          "android.permission.INTERNET" = true
          "android.permission.WAKE_LOCK" = true
          "android.permission.FOREGROUND_SERVICE" = true

          [tool.flet.android]
          # 降低最低支持版本以覆盖更多设备
          min_sdk_version = 21
          # 将目标SDK版本从36降到一个更稳定的版本，例如30或31，这对签名兼容性非常关键
          target_sdk_version = 30
          # 明确指定要构建的CPU架构，通常兼容性更好
          abis = ["armeabi-v7a", "arm64-v8a"]
          EOF

      - name: 恢复签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-key.jks
          ls -la android-key.jks
          # 验证 keystore 文件是否有效
          keytool -list -v -keystore android-key.jks -storepass ${{ secrets.KEYSTORE_PASSWORD }} | head -20
          echo "签名密钥已恢复"

      # 新增一个步骤，用于设置 Android 签名环境
      - name: Set up Android SDK Build-Tools
        run: |
          # 下载并解压最新版本的 build-tools
          wget -q https://dl.google.com/android/repository/build-tools_r34-linux.zip
          unzip -q build-tools_r34-linux.zip -d $RUNNER_TEMP/build-tools
          echo "$RUNNER_TEMP/build-tools/build-tools/34.0.0" >> $GITHUB_PATH

      - name: 执行 APK 构建
        run: |
          export FLET_APP_NAME="事件提醒助手"
          flet build apk --yes
          
      # 替换您原有的所有签名步骤为下面这一个
      - name: Sign APK with apksigner (V1+V2+V3)
        run: |
          APK_PATH="./build/apk/birthday_reminder.apk"
          echo "Signing APK: $APK_PATH"

          # 使用 apksigner 进行签名，强制启用 V1、V2、V3
          apksigner sign \
            --ks android-key.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK_PATH"

          # 验证签名是否成功
          echo "Verifying APK signature:"
          apksigner verify --verbose "$APK_PATH"

      # 继续您原有的上传或发布步骤
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: birthday-reminder-v${{ steps.version.outputs.version }}
          path: ./build/apk/birthday_reminder.apk