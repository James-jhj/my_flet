name: Build Flet Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet flet-audio lunardate requests mutagen

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' main.py)
          VERSION_CODE=$(grep -oP 'APP_VERSION_CODE = \K\d+' main.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "从 main.py 读取到版本: $VERSION, 版本号: $VERSION_CODE"
      
      - name: 创建 requirements.txt
        run: |
          cat > requirements.txt << 'EOF'
          flet
          flet-audio
          requests
          mutagen
          lunardate
          EOF
      
      - name: Create pyproject.toml
        run: |
          cat > pyproject.toml << 'EOF'
          [project]
          name = "birthday_reminder"
          version = "${{ steps.version.outputs.version }}"
          description = "事件提醒助手"
          requires-python = ">=3.9"
          dependencies = [
              "flet",
              "flet-audio",
              "lunardate",
              "requests",
              "mutagen",
          ]

          [tool.flet]
          org = "com.jianghuajie"
          app_name = "事件提醒助手"
          product = "birthday_reminder"

          [tool.flet.flutter]
          dependencies = ["flet_audio"]

          [tool.flet.android.permission]
          "android.permission.READ_MEDIA_AUDIO" = true
          "android.permission.READ_EXTERNAL_STORAGE" = true
          "android.permission.INTERNET" = true
          "android.permission.WAKE_LOCK" = true
          "android.permission.FOREGROUND_SERVICE" = true
          EOF

      - name: 执行 APK 构建（带签名）
        run: |
          flet pack main.py \
            --name "事件提醒助手" \
            --build-version ${{ steps.version.outputs.version }} \
            -r requirements.txt \
            --android-keystore android-key.jks \
            --android-keystore-password James8329@ \
            --android-key-alias event-key \
            --android-key-password James8329@

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: birthday-reminder-v${{ steps.version.outputs.version }}
          path: dist/*.apk # flet pack 输出到 dist/