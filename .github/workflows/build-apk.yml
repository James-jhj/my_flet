# .github/workflows/build-apk.yml
name: Build Flet APK

# 指定工作流的触发方式：允许你从 GitHub 网页上手动点击运行
on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flet Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. 检出你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境 (Flet 需要 Python 3.8 到 3.12)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装你的项目依赖 (如果你的依赖写在 requirements.txt 里)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 设置 Java 环境 (Android 构建必需)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. 安装并锁定 Flutter SDK 版本 (关键步骤，确保环境稳定)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'  # 使用一个已知稳定的 Flutter 版本
          channel: 'stable'
          cache: true

      # 6. 运行 Flutter doctor (可选，主要用于调试，看看环境是否正常)
      - name: Run Flutter doctor
        run: flutter doctor -v

      # 7. 执行 Flet 打包命令，生成 APK
      - name: Build APK with Flet
        run: |
          # -v 参数可以输出更详细的日志，方便排查问题
          flet build apk --split-per-abi -v

      # 8. 将生成的 APK 文件上传，作为构建成果保存
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apks
          path: build/apk
