name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 关键改进：明确安装 Flutter 3.41.4（这是 Flet 0.84.0 实际需要的版本）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # 关键改进：设置环境变量，禁用所有交互式提示
      - name: Build APK
        run: |
          export FLET_CLI_NO_PROMPT=1
          export DEBIAN_FRONTEND=noninteractive
          flet build apk --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apks
          path: build/apk
